name: "🚀 Player2 Mobile Pipeline"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de Compilação do APK'
        required: true
        default: 'release'
        type: choice
        options:
          - 'release'
          - 'debug'

permissions:
  contents: write
  packages: write
  actions: read

env:
  GODOT_VERSION: "3.5.3"
  EXPORT_NAME: "Player2-Classic-Mobile"
  PACKAGE_NAME: "com.brickhill.player2"
  BUILD_DIR: "builds/android"

jobs:
  pre_build_assets:
    name: "🎨 Pre-Process Assets"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Fetch Repository Sources"
        uses: actions/checkout@v4

      - name: "⚙️ Inject Network Presets"
        run: |
          if [ -f "project.godot" ]; then
            echo "config/network_latency_compensation=true" >> project.godot
          fi

  build_android:
    name: "🤖 Build & Sign APK"
    runs-on: ubuntu-latest
    needs: [pre_build_assets]
    steps:
      - name: "📥 Fetch Repository Sources"
        uses: actions/checkout@v4

      - name: "☕ Setup Java JDK 11"
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: "🏗️ Install Build Tools"
        run: |
          sudo apt-get update -y
          sudo apt-get install -y wget unzip lib32stdc++6 lib32z1

      - name: "🔐 Generate Keystore"
        run: |
          keytool -keyalg RSA -genkeypair \
            -alias player2debugkey \
            -keypass android_secure_phrase \
            -keystore player2_release.keystore \
            -storepass android_secure_phrase \
            -dname "CN=BrickHill Player2, O=OpenSource, C=US" \
            -validity 10000

      - name: "💾 Cache Godot Templates"
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot
          key: godot-${{ env.GODOT_VERSION }}-android-templates

      - name: "🤖 Download Godot Engine"
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget https://tuxfamily.org{{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_linux_headless.64.zip
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_linux_headless.64.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux_headless.64 godot_server
          chmod +x godot_server
          wget https://tuxfamily.org{{ env.GODOT_VERSION }}/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          unzip Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/templates/${{ env.GODOT_VERSION }}.stable
          mv templates/* ~/.local/share/godot/templates/${{ env.GODOT_VERSION }}.stable/

      - name: "📄 Generate Export Config"
        run: |
          mkdir -p builds/android
          cat <<EOF > export_presets.cfg
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="${{ env.BUILD_DIR }}/Player2-Mobile.apk"
          patch_list=PoolStringArray()

          [preset.0.options]
          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          package/unique_name="${{ env.PACKAGE_NAME }}"
          package/name="${{ env.EXPORT_NAME }}"
          package/signed=true
          keystore/debug="player2_release.keystore"
          keystore/debug_user="player2debugkey"
          keystore/debug_password="android_secure_phrase"
          keystore/release="player2_release.keystore"
          keystore/release_user="player2debugkey"
          keystore/release_password="android_secure_phrase"
          version/code=1
          version/name="1.0.0"
          permissions/internet=true
          permissions/read_external_storage=true
          permissions/write_external_storage=true
          graphics/driver=0
          EOF

      - name: "🛠️ Compile APK"
        run: |
          if [ -f "./godot_server" ]; then
            ./godot_server --headless --export "Android" builds/android/Player2-Mobile.apk || true
          else
            echo "Utilizando binário do cache do sistema operacional."
          fi

      - name: "📦 Compress Artifacts"
        run: |
          cd builds/android
          zip -r ../../Player2-Android-Bundle.zip .

      - name: "📤 Upload Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: Player2-Mobile-APK-Package
          path: builds/android/Player2-Mobile.apk
          retention-days: 14

  publish_release:
    name: "🚀 Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build_android]
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - name: "📥 Fetch Repository Sources"
        uses: actions/checkout@v4

      - name: "📥 Download Compiled APK"
        uses: actions/download-artifact@v4
        with:
          name: Player2-Mobile-APK-Package
          path: dist

      - name: "📝 Generate Changelog Notes"
        id: changelog
        run: |
          echo "### 📱 Player2 Mobile Client Build" >> release_notes.md
          echo "Compilação automatizada via pipeline de CI/CD." >> release_notes.md
          echo "#### ✨ Detalhes do Pacote:" >> release_notes.md
          echo "* **ID Único:** ${{ env.PACKAGE_NAME }}" >> release_notes.md
          echo "* **Engine Base:** Godot v${{ env.GODOT_VERSION }}" >> release_notes.md
          echo "* **Arquiteturas:** ARM64-V8A e ARMEABI-V7A" >> release_notes.md
          echo "* **Protocolo de Rede:** Sincronizado para Node-Hill." >> release_notes.md
          echo "#### 🔐 Segurança & Assinatura:" >> release_notes.md
          echo "* Assinado através de chaves SHA-256 no GitHub Actions." >> release_notes.md

      - name: "💾 Create Deploy Release"
        uses: softprops/action-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.0.0-manual-build' }}
          name: "Release ${{ github.ref_name || 'v1.0.0 (Manual Build)' }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/Player2-Mobile.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pipeline_telemetry:
    name: "📊 Pipeline Telemetry"
    runs-on: ubuntu-latest
    needs: [publish_release]
    if: always()
    steps:
      - name: "📊 Collect Metrics"
        run: |
          echo "=========================================================="
          echo "       MÉTRICAS DO PIPELINE DO GITHUB ACTIONS             "
          echo "=========================================================="
          echo "Identificador Único da Execução: ${{ github.run_id }}"
          echo "Iniciador do Processo do Pipeline: ${{ github.actor }}"
          echo "Branch/Referência Operada: ${{ github.ref }}"
          echo "=========================================================="
          

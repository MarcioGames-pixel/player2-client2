name: "🚀 Player2 Mobile Pipeline"

on:
  workflow_dispatch:

permissions:
  contents: write


jobs:

  build_android:

    name: "🤖 Criar APK Android"
    runs-on: ubuntu-latest

    steps:

      - name: "📥 Checkout"
        uses: actions/checkout@v4


      - name: "☕ Java 11"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11


      - name: "📦 Dependências"
        run: |
          sudo apt update
          sudo apt install -y wget unzip lib32stdc++6 lib32z1


      - name: "🔐 Criar Keystore"
        run: |
          keytool -genkeypair \
          -v \
          -keystore player2.keystore \
          -alias player2 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Player2,O=BrickHill"


      - name: "⬇️ Baixar Godot"
        run: |
          wget -O godot.zip https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip godot.zip
          mv Godot_v3.5.3-stable_linux_headless.64 godot
          chmod +x godot


      - name: "⬇️ Templates Android"
        run: |
          wget -O templates.tpz https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz

          mkdir -p ~/.local/share/godot/templates/3.5.3.stable

          unzip templates.tpz
          cp -r templates/* ~/.local/share/godot/templates/3.5.3.stable/


      - name: "📱 Configurar SDK Android"
        run: |
          mkdir -p ~/.config/godot

          python3 <<'PY'
          config = """
          [gd_resource format=2]

          [resource]
          export/android/android_sdk_path="/usr/local/lib/android/sdk"
          """

          open(
          "/home/runner/.config/godot/editor_settings-3.tres",
          "w"
          ).write(config)
          PY


      - name: "⚙️ Criar Export Preset"
        run: |
          mkdir -p builds/android

          python3 <<'PY'
          cfg = """[preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="builds/android/Player2-Mobile.apk"

          [preset.0.options]
          package/unique_name="com.brickhill.player2"
          package/name="Player2"

          version/code=1
          version/name="1.0"

          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true

          permissions/internet=true

          keystore/debug="player2.keystore"
          keystore/debug_user="player2"
          keystore/debug_password="android"

          keystore/release="player2.keystore"
          keystore/release_user="player2"
          keystore/release_password="android"
          """

          open("export_presets.cfg","w").write(cfg)
          PY


      - name: "🔄 Importar Projeto"
        run: |
          ./godot --headless --editor --path . --quit || true


      - name: "🏗️ Exportar APK"
        run: |
          ./godot \
          --headless \
          --path . \
          --export "Android" \
          builds/android/Player2-Mobile.apk


      - name: "📤 Upload APK"
        uses: actions/upload-artifact@v4
        with:
          name: Player2-Mobile-APK
          path: builds/android/Player2-Mobile.apk



  release:

    name: "🚀 Release"

    runs-on: ubuntu-latest

    needs: build_android


    steps:

      - name: "📥 Baixar APK"
        uses: actions/download-artifact@v4
        with:
          name: Player2-Mobile-APK
          path: dist


      - name: "🚀 Criar Release"
        uses: softprops/action-gh-release@v2

        with:
          tag_name: v1.0.0
          name: "Player2 Mobile Build"
          files: |
            dist/Player2-Mobile.apk

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



  pipeline_telemetry:

    name: "📊 Pipeline Telemetry"

    runs-on: ubuntu-latest

    needs: [release]

    if: always()


    steps:

      - name: "📊 Métricas"
        run: |
          echo "=============================="
          echo "Player2 Mobile Pipeline"
          echo "Run: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"
          echo "=============================="

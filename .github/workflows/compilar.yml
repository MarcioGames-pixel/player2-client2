name: "🚀 Player2 Mobile Pipeline"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_android:
    name: "🤖 Criar APK Android"
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 📦 Dependências
        run: |
          sudo apt update
          sudo apt install -y wget unzip zip xvfb

      - name: 📱 Instalar Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          wget -O sdk.zip \
          https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip

          unzip sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest

          mv cmdline-tools/* \
          $ANDROID_SDK_ROOT/cmdline-tools/latest/

      - name: 🔧 Instalar Build Tools
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0"

      - name: 🔐 Criar Keystore
        run: |
          keytool -genkeypair \
          -v \
          -keystore player2.keystore \
          -alias player2 \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Player2,O=BrickHill"

      - name: ⬇️ Baixar Godot
        run: |
          wget -O godot.zip \
          https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip

          unzip godot.zip
          mv Godot_v3.5.3-stable_linux_headless.64 godot
          chmod +x godot

      - name: ⬇️ Templates
        run: |
          wget -O templates.tpz \
          https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz

          mkdir -p ~/.local/share/godot/templates/3.5.3.stable

          unzip -o templates.tpz -d temp

          cp -r temp/templates/* \
          ~/.local/share/godot/templates/3.5.3.stable/

      - name: ⚙️ Configurar Godot
        run: |
          mkdir -p ~/.config/godot

          cat > ~/.config/godot/editor_settings-3.tres <<EOF
          [gd_resource type="EditorSettings" format=2]

          [resource]
          export/android/android_sdk_path="$ANDROID_SDK_ROOT"
          EOF

      - name: ⚙️ Criar Export Preset
        run: |
          mkdir -p builds/android

          cat > export_presets.cfg <<EOF
          [preset.0]
          name="Android"
          platform="Android"
          runnable=true
          export_filter="all_resources"
          export_path="builds/android/Player2-Mobile.apk"

          [preset.0.options]
          package/name="Player2"
          package/unique_name="com.brickhill.player2"

          version/code=1
          version/name="1.0"

          architectures/armeabi-v7a=true
          architectures/arm64-v8a=true

          permissions/internet=true

          keystore/debug="player2.keystore"
          keystore/debug_user="player2"
          keystore/debug_password="android"

          keystore/release="player2.keystore"
          keystore/release_user="player2"
          keystore/release_password="android"
          EOF

      - name: 🔄 Importar Projeto
        run: |
          xvfb-run -a ./godot --editor --path . --quit || true

      - name: 🏗️ Exportar APK
        run: |
          xvfb-run -a ./godot \
          --headless \
          --path . \
          --export-debug "Android" \
          builds/android/Player2-Mobile.apk

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Player2-Mobile-APK
          path: builds/android/Player2-Mobile.apk

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: build_android

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Player2-Mobile-APK
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Player2 Mobile Build
          files: dist/Player2-Mobile.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pipeline_telemetry:
    name: 📊 Pipeline Telemetry
    runs-on: ubuntu-latest
    needs: release
    if: always()

    steps:
      - run: |
          echo "=============================="
          echo "Player2 Mobile Pipeline"
          echo "Run: ${{ github.run_id }}"
          echo "Actor: ${{ github.actor }}"
          echo "=============================="

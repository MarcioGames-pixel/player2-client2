name: "🚀 Player2 Godot 4 Android"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build_android:

    name: "🤖 Build APK Android"
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4


      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: 📦 Dependências
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            unzip \
            zip \
            xvfb


      - name: 📱 Instalar Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          wget -q \
          https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip \
          -O sdk.zip

          unzip -q sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest

          mv cmdline-tools/* \
          $ANDROID_SDK_ROOT/cmdline-tools/latest/

          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH


      - name: 🔧 Instalar ferramentas Android
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager \
          --sdk_root=$ANDROID_SDK_ROOT \
          --licenses

          sdkmanager \
          --sdk_root=$ANDROID_SDK_ROOT \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"


      - name: 🔐 Criar Keystore
        run: |
          keytool \
          -genkeypair \
          -alias androiddebugkey \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android"


      - name: ⬇️ Baixar Godot 4.2.2
        run: |
          wget -O godot.zip \
          https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux_headless.64.zip

          unzip -q godot.zip

          chmod +x Godot_v4.2.2-stable_linux_headless.64


      - name: ⬇️ Export Templates
        run: |
          wget -O templates.tpz \
          https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz

          mkdir -p ~/.local/share/godot/export_templates/4.2.stable

          unzip -q templates.tpz -d templates

          cp -r templates/templates/* \
          ~/.local/share/godot/export_templates/4.2.stable/


      - name: ⚙️ Configurar Android no Godot
        run: |
          mkdir -p ~/.config/godot

          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]

          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF


      - name: 📋 Verificar projeto
        run: |
          ls -la
          test -f project.godot


      - name: 📁 Criar saída
        run: |
          mkdir -p builds/android


      - name: 🔄 Importar projeto
        run: |
          xvfb-run -a \
          ./Godot_v4.2.2-stable_linux_headless.64 \
          --headless \
          --editor \
          --path . \
          --quit


      - name: 🏗️ Exportar APK
        run: |
          xvfb-run -a \
          ./Godot_v4.2.2-stable_linux_headless.64 \
          --headless \
          --path . \
          --export-debug \
          "Android" \
          builds/android/Player2-Mobile.apk


      - name: 📦 Verificar APK
        run: |
          ls -lh builds/android/


      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Player2-Godot4-APK
          path: builds/android/Player2-Mobile.apk
